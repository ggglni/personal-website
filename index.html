<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giorgio Giuliani — Finance & Software</title>
  <meta name="description" content="Giorgio Giuliani — engineer at the intersection of software and finance. Based in Milan." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #2a3f5f;
      --ink:    #e8e6e0;
      --muted:  #7a92aa;
      --accent: #a8c0d8;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1.1rem;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      padding: 2rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: .95rem;
      transition: color .15s;
    }

    nav a:hover { color: var(--ink); }

    .nav-links { display: flex; gap: 2rem; }

    /* ── MAIN ── */
    main {
      flex: 1;
      max-width: 520px;
      margin: 0 auto;
      padding: 5rem 2.5rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 400;
      letter-spacing: -.01em;
      margin-bottom: .75rem;
      line-height: 1.5;
      font-style: italic;
    }

    .attribution {
      font-size: .95rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 2.5rem;
    }

    /* ── VENTURES ── */
    .ventures {
      margin-bottom: 2.5rem;
    }

    .ventures-label {
      font-size: .8rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .75rem;
    }

    .ventures ul {
      list-style: none;
    }

    .ventures li {
      padding: .45rem 0;
      border-bottom: 1px solid rgba(232,230,224,.1);
    }

    .ventures a {
      color: var(--ink);
      text-decoration: none;
      transition: color .15s;
    }

    .ventures a:hover { color: var(--accent); }

    /* ── LINKS ── */
    .links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-top: 3rem;
    }

    .links a {
      color: var(--muted);
      text-decoration: none;
      font-size: .95rem;
      border-bottom: 1px solid rgba(232,230,224,.2);
      padding-bottom: 1px;
      transition: color .15s, border-color .15s;
    }

    .links a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── FOOTER ── */
    footer {
      padding: 1.5rem 2.5rem;
      color: var(--muted);
      font-size: .85rem;
      border-top: 1px solid rgba(232,230,224,.08);
      display: flex;
      justify-content: center;
    }

    /* ── FADE IN ── */
    main { opacity: 0; animation: fade .5s .05s forwards; }
    @keyframes fade { to { opacity: 1; } }

    @media (max-width: 480px) {
      nav { padding: 1.5rem; flex-direction: column; gap: 1rem; }
      main { padding: 3rem 1.5rem; }
      footer { padding: 1.25rem 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/">ggglni</a>
    <div class="nav-links">
      <a href="/ventures.html">Ventures</a>
      <a href="/books.html">Reads</a>
      <a href="https://lombardnotes.xyz" target="_blank">Thoughts</a>
    </div>
  </nav>

  <main>
    <h1>"The true sign of intelligence is not knowledge but imagination."</h1>
    <p class="attribution">Albert Einstein</p>

    <div class="links">
      <a href="https://x.com/ggglni" target="_blank">X</a>
      <a href="https://www.linkedin.com/in/giorgiogiuliani/" target="_blank">LinkedIn</a>
      <a href="https://github.com/ggglni" target="_blank">GitHub</a>
    </div>
  </main>

  <footer>
    <span>Built in Italy 🇮🇹</span>
  </footer>

</body>
</html>
